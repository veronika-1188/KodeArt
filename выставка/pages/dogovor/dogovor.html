<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dogovor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="dogovor">
        <div class="dogovor__container">
            <p class="dogovor-text">Я, <input type="text" name="fio" id="fio" placeholder="(впишите свое имя)"> ,</p>
            <p class="dogovor-text">
               <textarea  type="text" name="problem" id="problem" class="problem" placeholder="(впишите наименование беспокоящей вас ситуации или проблемы)" rows="2"></textarea>
            </p>
            <p class="dogovor-text"><span class="bold">Я признаю, что не знаю, что с этим делать.</span></p>
            <p class="dogovor-text">Договор вступает в силу с момента подписи.</p>
        </div>

        

        <div class="podpis__container">
            <p class="podpis-text">Дата: <input type="text" name="date" id="date"> ,</p>
            <p class="podpis-text">Подпись: <button id="btn">(нажмите, чтобы заполнить)</button></p>
        </div>

        <div class="result__text"><span class="bold">И это ничего не значит</span></div>
    </div>
</body>
<script src="script.js"></script>

</html>
