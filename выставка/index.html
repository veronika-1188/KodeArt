<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search</title>
</head>

<body>
    <header class="header">
        <a href="#" class="header_link">Почта</a>
        <a href="#" class="header_link">Картинки</a>
        <div class="menu">
            <image class="header__img" src="https://ssl.gstatic.com/gb/images/bar/al-icon.png" alt="" height="24"
                width="24" style="border:none;display:none \9"></image>
        </div>
        <a href="#" class="headder_btn">Войти</a>
    </header>

    <main>
        
        <h1 class="logo">
    <span style="color: #4285F4;">П</span><span style="color: #EA4335;">о</span><span style="color: #FBBC05;">и</span><span style="color: #4285F4;">с</span><span style="color: #34A853;">к</span>
</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Поиск по сайту..." autocomplete="off">
            <svg class="search-icon" id="searchIcon" focusable="false" xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24">
                <path
                    d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z">
                </path>
            </svg>
            <div class="search-results" id="searchResults"></div>
        </div>

        <div class="buttons">
            <button>Поиск в Google</button>
            <button>Мне повезёт!</button>
        </div>
    </main>

    <style>
        * {
            border: none;
            outline: none;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        header {
            top: 0;
            font-family: Arial, sans-serif;
            width: 100%;
            height: 10vh;
            display: flex;
            gap: 1%;
            align-items: center;
            justify-content: end;
            padding: 2% 4%;
        }

        .logo {
    font-family: Arial, sans-serif;
    font-size: clamp(50px, 9vw, 100px);
    font-weight: 700;
    letter-spacing: -2px;
    margin-bottom: 20px;
    user-select: none;
    display: flex;
    align-items: baseline;
}

.logo span {
    display: inline-block;
    transition: transform 0.3s ease;
}

.logo span:hover {
    transform: translateY(-8px) scale(1.1);
}


        a {
            text-decoration: none;
            color: #383838;
        }

        a:hover {
            text-decoration: underline;
        }

        .headder_btn {
            background-color: #0b57d0;
            color: white;
            padding: 1% 1.7%;
            border-radius: 30px;
        }

        .headder_btn:hover {
            text-decoration: none;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, .3), 0 1px 3px 1px rgba(0, 0, 0, .15);
        }

        main {
            font-family: Arial, sans-serif;
            height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .search-box {
            height: 7vh;
            width: 45vw;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #ccc;
            border-radius: 24px;
            padding: 10px 16px;
            box-shadow: 0 1px 6px rgba(32, 33, 36, .28);
            position: relative;
        }

        .search-box input {
            flex: 1;
            font-size: 16px;
            padding: 8px 0;
        }

        .search-icon {
            width: 24px;
            height: 24px;
            fill: #6c6c6c;
            cursor: pointer;
        }

        .search-icon:hover {
            fill: #4285f4;
        }

        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            margin-top: 4px;
        }

        .result-item {
            padding: 12px 16px;
            cursor: pointer;
            font-size: 14px;
        }

        .result-item:hover {
            background: #f0f0f0;
        }

        .no-results {
            padding: 12px 16px;
            color: #999;
            font-size: 14px;
        }

        .buttons {
            margin-top: 24px;
            display: flex;
            gap: 10px;
        }

        .buttons button {
            padding: 10px 20px;
            font-size: 14px;
            border: none;
            border-radius: 4px;
            background-color: #f8f9fa;
            cursor: pointer;
        }

        .buttons button:hover {
            background-color: #e8e8e8;
        }

        @media (max-width: 600px) {
            .search-box {
                width: 90vw;
                height: 6vh;
                padding: 8px 12px;
            }

            .search-icon {
                width: 20px;
                height: 20px;
            }

            .buttons button {
                padding: 8px 16px;
                font-size: 13px;
            }
        }
    </style>

    <script>
       const pages = [
    { name: 'КВН', url: '../pages/kvn/kvn.html', keywords: ['квн'] },
    { name: 'Словарь', url: '../pages/slovar/slovar.html', keywords: ['словарь', 'слова'] },
    { name: 'Карта', url: '../pages/karta/karta.html', keywords: ['карта', 'самокат'] },
    { name: 'Криминал', url: '../pages/kriminal/kriminal.html', keywords: ['криминал', 'новости'] },
    { name: 'Договор', url: '../pages/dogovor/dogovor.html', keywords: ['договор'] },
    { name: 'Змейка', url: '../pages/zmeika/zmeika.html', keywords: ['змейка', 'игра', 'snake'] }
];

const searchInput = document.getElementById('searchInput');
const resultsDiv = document.getElementById('searchResults');
const searchIcon = document.getElementById('searchIcon');

// ===== Универсальная функция показа результатов =====
function showResults(query = '') {
    const lowerQuery = query.toLowerCase().trim();

    // Если запрос пустой — показываем все страницы
    let matches;
    if (lowerQuery === '') {
        matches = pages;
    } else {
        matches = pages.filter(page =>
            page.name.toLowerCase().includes(lowerQuery) ||
            page.keywords.some(kw => kw.includes(lowerQuery))
        );
    }

    if (matches.length > 0) {
        resultsDiv.innerHTML = matches.map(page =>
            `<div class="result-item" data-url="${page.url}">${page.name}</div>`
        ).join('');
        resultsDiv.style.display = 'block';

        // Вешаем обработчики клика на каждый элемент
        document.querySelectorAll('.result-item').forEach(item => {
            item.addEventListener('click', () => {
                window.location.href = item.dataset.url;
            });
        });
    } else {
        resultsDiv.innerHTML = '<div class="no-results">Ничего не найдено</div>';
        resultsDiv.style.display = 'block';
    }
}

// ===== Функция поиска страницы по точному совпадению =====
function findPageByQuery(query) {
    const lowerQuery = query.toLowerCase().trim();
    if (lowerQuery === '') return null;

    return pages.find(page =>
        page.name.toLowerCase() === lowerQuery ||
        page.keywords.some(kw => kw === lowerQuery) ||
        page.name.toLowerCase().includes(lowerQuery) ||
        page.keywords.some(kw => kw.includes(lowerQuery))
    );
}

function navigateToPage(page) {
    if (page) {
        window.location.href = page.url;
    }
}

function searchAndNavigate() {
    const query = searchInput.value;
    const matchedPage = findPageByQuery(query);

    if (matchedPage) {
        navigateToPage(matchedPage);
    } else if (query.trim() !== '') {
        alert('Страница не найдена. Попробуйте: КВН, Словарь, Карта, Криминал, Договор, Змейка');
    }
}

// ===== Клик по иконке поиска =====
searchIcon.addEventListener('click', searchAndNavigate);

// ===== Enter в поле ввода =====
searchInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        e.preventDefault();
        searchAndNavigate();
    }
});

// ===== КЛИК ПО СТРОКЕ ПОИСКА → показ всех ссылок =====
searchInput.addEventListener('focus', () => {
    showResults(searchInput.value);
});

// ===== Фильтрация при вводе текста =====
searchInput.addEventListener('input', (e) => {
    showResults(e.target.value);
});

// ===== Закрыть результаты при клике вне =====
document.addEventListener('click', (e) => {
    if (!searchInput.contains(e.target) && !resultsDiv.contains(e.target)) {
        resultsDiv.style.display = 'none';
    }
});
    </script>
</body>

</html>
