<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="map-placeholder">
    <div class="map-container" id="mapContainer">
        <img class="map-widget" src="img/map.png" alt="map" id="mapWidget">
    </div>
</div>


    <div class="top-panel" id="routeCard">
        <div class="route-points">
            <div class="point" id="cardHeader">
                <span class="star green"></span>
                <span>Челюскинцев 60</span>
            </div>

        <div class="expanded-view" id="expandedView">
            <div class="route-list">
                
                <div class="route-list-item">
                    <span class="route-list-star star green"></span>
                    <span class="route-list-text">Мельниковская, 3</span>
                </div>
                <div class="route-list-item">
                    <span class="route-list-star star green"></span>
                    <span class="route-list-text">Свердловская кинностудия</span>
                </div>
                <div class="route-list-item">
                    <span class="route-list-star star green"></span>
                    <span class="route-list-text">Ленина, 52Б</span>
                </div>
                <div class="route-list-item">
                    <span class="route-list-star star green"></span>
                    <span class="route-list-text">Декабристов, 67</span>
                </div>
                <div class="route-list-item">
                    <span class="route-list-star star green"></span>
                    <span class="route-list-text">Степана Разина, 74</span>
                </div>
                
            </div>
        </div>

            <div class="point"  id="cardHeader2">
                <span class="star orange"></span>
                <span>Белинского 165Б</span>
            </div>
        </div>

        <div class="top-right">
            <div class="promo-badge">
                <div class="promo-text">
                    <span class="promo-title">ПРЕЗРЕНИЕ К САМОКАТАМ</span>
                    <span class="promo-sub">+1000 очков в карму</span>
                </div>
            </div>
            <div class="top-icons">
                <button class="icon-btn share-btn"><img src="img/reverse.svg" alt="rev"></button>
                <button class="icon-btn close-btn"><img src="img/close.svg" alt="close"></button>
            </div>
        </div>
    </div>

    <div class="route-card">
        <div class="card-header">
            <div class="card-info">
                <div class="time-row">
                    <span class="time-big">2 ч 10 мин</span>
                    <span class="time-arrow">→</span>
                    <span class="time-big">15:44</span>
                </div>
                <div class="distance">9,5 км</div>
            </div>
            <button class="start-btn">В путь</button>
        </div>

        <img class="chart" src="img/lines.svg">
        </img>

        <div class="legend">
            <div class="legend-item">
                <span class="legend-dot green"></span>
                <span>Ровный участок</span>
            </div>
            <div class="legend-item">
                <span class="legend-dot orange"></span>
                <span>Подъём</span>
            </div>
        </div>
    </div>

    <div class="transport-nav">
        <button class="transport-btn"><img src="img/scooter.svg" alt="scooter"></button>
        <button class="transport-btn active"><img src="img/avto.svg" alt="avto"></button>
        <button class="transport-btn"><img src="img/bus.svg" alt="bus"></button>
        <button class="transport-btn"><img src="img/bicycle.svg" alt="bicycle"></button>
        <button class="transport-btn"><img src="img/onFoot.svg" alt="on-foot"></button>
    </div>

<script src="script.js"></script>

</body>
</html>
